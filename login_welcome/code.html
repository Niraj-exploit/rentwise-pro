<body class="bg-background text-on-background min-h-screen flex flex-col justify-center font-body-md">

<img alt="Modern apartment building" class="w-full h-full object-cover" data-alt="A clean, modern architectural rendering or photograph of a sleek apartment building in a sunny, clear sky setting. The building features contemporary glass facades and minimal lines, reflecting a professional and authoritative real estate brand. The lighting is bright and high-key, emphasizing a pristine, secure, and modern fintech-inspired aesthetic suited for a property management application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDMuymKlNTjMfStvtshP7L0TzdlBwbgT-2dqp7jhC10WXR1PAorR_SEgudNOvimDYtIuTm_Oc25kzb2KP_0wvYLY8ts_wzD2knzdF2cwq9kL4RWF8KDzFjsLLZxdP5gJ4DpB7qql8IVDy_QKGFJHSmd6PhKTZC6eeEEY5AbF1nfGp3vQ-AtHIj9k0jI7GiZgy0R1vJhHlU06yzwuOnasTZbCz9leA9UwOE5iOGgT1prc_ttLCjSvhJD6N-u5IbWuSMWm79de5GOuuY"/>

<div class="text-center mb-xl">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-sm">Hamro Property</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Manage your properties with ease</p>
</div>
<form class="bg-surface p-lg rounded-xl border border-outline-variant shadow-[0px_4px_12px_rgba(0,0,0,0.05)] flex flex-col gap-md relative z-10">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="identifier">Mobile Number or Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">person</span>
<input class="w-full h-12 pl-10 pr-4 rounded-lg border border-outline-variant bg-surface text-on-surface font-body-md text-body-md focus:border-primary focus:ring-3 focus:ring-primary/20 transition-all outline-none" id="identifier" name="identifier" placeholder="Enter your details" type="text"/>
</div>
</div>
<div class="flex flex-col gap-xs" id="password-field">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="w-full h-12 pl-10 pr-10 rounded-lg border border-outline-variant bg-surface text-on-surface font-body-md text-body-md focus:border-primary focus:ring-3 focus:ring-primary/20 transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
<div class="flex justify-end mt-1">
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot password?</a>
</div>
</div>
<button class="w-full h-12 mt-sm rounded-lg bg-primary text-on-primary font-label-md text-label-md flex items-center justify-center gap-2 bg-gradient-to-b from-white/10 to-transparent hover:shadow-[0px_8px_20px_rgba(37,99,235,0.2)] transition-all active:scale-[0.98]" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
<div class="relative flex items-center justify-center py-sm">
<div class="absolute border-t border-outline-variant w-full"></div>
<span class="bg-surface px-3 font-label-sm text-label-sm text-on-surface-variant relative z-10">OR</span>
</div>
<button class="w-full h-12 rounded-lg border border-outline-variant bg-surface text-primary font-label-md text-label-md flex items-center justify-center gap-2 hover:bg-surface-container-low transition-colors" id="toggle-login-mode" type="button">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">dialpad</span>
<span>Login with OTP</span>
</button>
</form>
<div class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="font-label-md text-label-md text-primary hover:underline ml-1" href="#">Sign up</a>
</p>
</div>
</main>
<script>
        document.getElementById('toggle-login-mode').addEventListener('click', function() {
            const pwdField = document.getElementById('password-field');
            const btnText = this.querySelector('span:nth-child(2)');
            const btnIcon = this.querySelector('.material-symbols-outlined');
            
            if (pwdField.style.display === 'none') {
                pwdField.style.display = 'flex';
                btnText.textContent = 'Login with OTP';
                btnIcon.textContent = 'dialpad';
            } else {
                pwdField.style.display = 'none';
                btnText.textContent = 'Login with Password';
                btnIcon.textContent = 'lock';
            }
        });
    </script>
